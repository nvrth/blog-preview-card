<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Frontend Mentor Challenge | Blog Preview Card">
  <link rel="icon" type="image/png" sizes="32x32" href="public/assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="public/css/styles.css">
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <main>
    <article class="card">
      <img class="illustration-article" src="public/assets/images/illustration-article.svg" alt="illustration-article">

      <div class="card-content">
        <div class="tag">Learning</div>
        <p class="subtitle">Published 21 Dec 2023</p>
        <h1 class="title">HTML & CSS foundations</h1>
        <p class="description">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="social">
        <img src="public/assets/images/image-avatar.webp" alt="image-avatar">
        <p>Greg Hooper</p>
      </div>
    </article>
  </main>
</body>
</html>
